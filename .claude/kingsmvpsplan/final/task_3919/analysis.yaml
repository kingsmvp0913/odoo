  core_logic:
    - model: idx.merge.order.wizard
      function_signature: _merge_records_to_orders(self, records, source_model)
      trigger: button_click
      pseudocode: >
        現有邏輯不變。
        在 TestRequisition.create({...}) 的 vals dict 中補入：
          "image_file": rec.image_file,
          "image_file_name": rec.image_file_name,
        適用於 source_model == "idx.sale.order.ocr1" 及 source_model == "idx.sale.order.ocr2" 兩個分支。
        rec.image_file 已是 Base64 字串（由 OCR submit 時以 base64.b64encode 寫入），
        直接賦值給 Binary 欄位無需再次轉換。


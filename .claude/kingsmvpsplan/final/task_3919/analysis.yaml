    - "views/back/idx_test_requisition1.xml → form view 加入 image 欄位"
    - "views/back/idx_test_requisition2.xml → form view 加入 image 欄位"
    - "wizards/idx_merge_order_wizard.py → _merge_records_to_orders 補傳 image_file"

clarification_channel:
  - id: 1
    category: scope
    question: Q82 和 Q90 分別對應哪個 Odoo 表單或 Model？
    user_answer: 不要管Q82和Q90
  - id: 2
    category: data_model
    question: 送檢單明細跟訂單明細中的圖檔欄位需要哪種型態？
    user_answer: A，但是訂單明細不要增加圖檔，原本的邏輯應該是合併訂單的時候送檢單才會有多筆，訂單明細會合併相同檢測項目，所以不需要圖片檔
  - id: 3
    category: scope
    question: 「訂單也需連動OCR 掃描讀圖檔」這句話的具體意思為何？
    user_answer: 其他，從OCR合併訂單的時候要把圖檔寫入送檢單明細的圖片欄位，我的理解是1. 送檢單/報告頁籤 要增加一個欄位存OCR圖片，可手動上傳圖片、2. OCR合併訂單的時候寫入送檢單明細也要把圖片檔寫入第一步新增欄位


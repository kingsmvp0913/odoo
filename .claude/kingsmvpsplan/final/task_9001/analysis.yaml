case_id: "CASE-9001"
module: "sale_order_ext"
odoo_version: "17.0"
project_name: "SalesPlus"
execution_mode: "MODE_B"
description: "新增客戶優先級別欄位到銷售訂單"

technical_specification:
  models:
    - name: "sale.order"
      fields:
        - name: "priority_level"
          type: "selection"
          selection: "[('normal','Normal'),('high','High'),('critical','Critical')]"
  views:
    - model: "sale.order"
      inherit: "sale.order.form"
      position: "after field name='partner_id'"
  business_logic: "priority_level 預設為 normal，critical 時觸發郵件通知"
questions:
  - id: q1
    question: "priority_level 是否需要在 list view 顯示？"
    user_answer: "是"

  implementation_steps:
    - "1. 在 models/sale_order.py 新增 priority_level Selection field"
    - "2. 在 views/sale_order_views.xml 新增 xpath 注入到 partner_id 後"
    - "3. 在 views/sale_order_views.xml 新增 list view column"
    - "4. 在 __manifest__.py 更新 data 清單"
  test_cases:
    - "建立訂單選擇 critical → 應觸發郵件通知"
    - "list view 應顯示 priority_level 欄位"
